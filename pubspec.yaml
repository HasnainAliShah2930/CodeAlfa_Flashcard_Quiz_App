name: flashcard_quiz_app
description: "A complete flashcard quiz application with BLoC and MVVM optimized for performance."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3
  get_it: ^7.6.0
  equatable: ^2.0.5
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.8
  uuid: ^4.4.0
  google_fonts: ^6.1.0
  go_router: ^14.2.0
  timeago: ^3.6.1
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assects/
